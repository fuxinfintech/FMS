<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FMS Core｜多商戶營運管理系統</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>FMS Core</h1>
    <p>多商戶營運管理系統</p>

    <input id="email" type="email" placeholder="請輸入 Email" />
    <input id="password" type="password" placeholder="請輸入密碼" />

    <button onclick="login()">登入系統</button>

    <div id="loginMsg"></div>
  </div>
</div>

<div id="dashboardPage" class="dashboard hidden">
  <aside class="sidebar">
    <h2>FMS Core</h2>
    <nav>
      <button onclick="showPage('dashboard')">📊 儀表板</button>
      <button>🏢 商戶管理</button>
      <button onclick="showPage('customers')">👥 客戶管理</button>
      <button onclick="showPage('cases')">📋 案件管理</button>
      <button onclick="showPage('payments')">💰 還款管理</button>
      <button>⚠️ 風控管理</button>
      <button>🚨 催收管理</button>
      <button>📄 合約中心</button>
      <button>👤 帳號權限</button>
      <button>📈 財務中心</button>
    </nav>
    <button class="logout" onclick="logout()">登出</button>
  </aside>

 <main class="main">

  <!-- 儀表板 -->
  <section id="dashboardSection">
    <h1>營運儀表板</h1>
    <p id="userInfo">登入中...</p>

    <div class="cards">
      <div class="card">
        <h3>今日案件</h3>
        <p id="todayCases">0</p>
      </div>
      <div class="card">
        <h3>待還款</h3>
        <p id="pendingPayments">0</p>
      </div>
      <div class="card">
        <h3>逾期案件</h3>
        <p id="overdueCases">0</p>
      </div>
      <div class="card">
        <h3>總商戶</h3>
        <p id="totalMerchants">0</p>
      </div>
    </div>
  </section>

  <!-- 客戶管理 -->
  <section id="customersSection" class="hidden">
    <h1>客戶管理</h1>

    <div class="form-box">
      <h3>新增客戶</h3>

      <div class="form-grid">
        <input id="customerName" placeholder="客戶姓名" />
        <input id="customerPhone" placeholder="手機號碼" />
        <input id="customerIdNumber" placeholder="身分證字號" />
        <input id="customerBirthday" type="date" />
        <input id="customerAddress" placeholder="戶籍地址" />
        <input id="customerNote" placeholder="備註" />
      </div>

      <button onclick="addCustomer()">新增客戶</button>
      <p id="customerMsg"></p>
    </div>

    <div class="table-box">
      <h3>客戶列表</h3>

      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>手機</th>
            <th>身分證</th>
            <th>生日</th>
            <th>地址</th>
            <th>建立時間</th>
          </tr>
        </thead>
        <tbody id="customersTable">
          <tr>
            <td colspan="6">載入中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 案件管理 -->
  <section id="casesSection" class="hidden">
    <h1>案件管理</h1>

    <div class="form-box">
      <h3>新增案件</h3>

      <div class="form-grid">
        <select id="caseCustomer">
          <option value="">選擇客戶</option>
        </select>

        <input id="caseAmount" type="number" placeholder="申請金額">
        <input id="caseActualReceived" type="number" placeholder="實際到帳">
        <input id="caseDays" type="number" value="7">
        <input id="caseStartDate" type="date">
        <input id="caseExtensionFee" type="number" placeholder="展期費">
      </div>

      <button onclick="addCase()">新增案件</button>
      <p id="caseMsg"></p>
    </div>

    <div class="table-box">
      <h3>案件列表</h3>

      <table>
        <thead>
       <tr>
  <th>案件編號</th>
  <th>客戶</th>
  <th>金額</th>
  <th>實拿</th>
  <th>已還</th>
  <th>剩餘</th>
  <th>天數</th>
  <th>起租日</th>
  <th>到期日</th>
  <th>結清日</th>
  <th>狀態</th>
</tr>
        </thead>

        <tbody id="casesTable">
          <tr>
            <td colspan="6">載入中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
<!-- 還款管理 -->
<section id="paymentsSection" class="hidden">
  <h1>還款管理</h1>

  <div class="form-box">
    <h3>新增還款紀錄</h3>

    <div class="form-grid">
      <select id="paymentCase">
        <option value="">選擇案件</option>
      </select>

      <select id="paymentType">
        <option value="展期">展期</option>
        <option value="結清">結清</option>
        <option value="部分還款">部分還款</option>
        <option value="逾期費">逾期費</option>
      </select>

      <input id="paymentAmount" type="number" placeholder="還款金額">
      <input id="paymentPaidAt" type="datetime-local">
      <input id="paymentNote" placeholder="備註">
    </div>

    <button onclick="addPayment()">新增還款</button>
    <p id="paymentMsg"></p>
  </div>

  <div class="table-box">
    <h3>還款紀錄</h3>

    <table>
      <thead>
        <tr>
          <th>案件編號</th>
          <th>客戶</th>
          <th>類型</th>
          <th>金額</th>
          <th>時間</th>
          <th>備註</th>
        </tr>
      </thead>

      <tbody id="paymentsTable">
        <tr>
          <td colspan="6">載入中...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
